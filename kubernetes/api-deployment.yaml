# HireSphere API - Kubernetes Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hiresphere-api
  labels:
    app: hiresphere-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hiresphere-api
  template:
    metadata:
      labels:
        app: hiresphere-api
    spec:
      containers:
        - name: api
          image: hiresphere-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: APP_ENV
              value: production
            - name: DB_CONNECTION
              value: mysql
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: hiresphere-db
                  key: host
            - name: DB_DATABASE
              valueFrom:
                secretKeyRef:
                  name: hiresphere-db
                  key: database
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: hiresphere-db
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hiresphere-db
                  key: password
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: hiresphere-api
spec:
  selector:
    app: hiresphere-api
  ports:
    - port: 80
      targetPort: 8000
  type: ClusterIP
