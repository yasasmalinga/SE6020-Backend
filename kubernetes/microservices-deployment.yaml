# HireSphere API split into domain microservices (same codebase, separate scaling units)

apiVersion: apps/v1
kind: Deployment
metadata:
  name: hiresphere-users
  labels:
    app: hiresphere-users
    domain: users
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hiresphere-users
  template:
    metadata:
      labels:
        app: hiresphere-users
        domain: users
    spec:
      containers:
        - name: api
          image: hiresphere-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: APP_ENV
              value: production
            - name: SERVICE_DOMAIN
              value: users
            - name: DB_CONNECTION
              value: mysql
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: hiresphere-db
                  key: host
            - name: DB_DATABASE
              valueFrom:
                secretKeyRef:
                  name: hiresphere-db
                  key: database
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: hiresphere-db
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hiresphere-db
                  key: password
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: hiresphere-users
spec:
  selector:
    app: hiresphere-users
  ports:
    - port: 80
      targetPort: 8000
  type: ClusterIP
---
